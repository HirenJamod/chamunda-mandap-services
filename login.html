<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific overrides for Login Page */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            color: var(--secondary);
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px !important;
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            color: white !important;
            font-size: 1rem;
            caret-color: var(--secondary);
        }

        input:focus {
            border-color: var(--secondary) !important;
            outline: none;
        }

        .btn-login {
            width: 100%;
            margin-top: 1rem;
            padding: 15px;
            border-radius: 12px;
        }

        .error-msg {
            color: #dc3545;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-tabs" style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
            <button class="tab-btn active" onclick="switchLogin('admin')" style="background: none; border: none; color: var(--secondary); cursor: pointer; font-family: 'Inter'; font-weight: 600; font-size: 0.8rem; letter-spacing: 1px;">ADMIN</button>
            <button class="tab-btn" onclick="switchLogin('customer')" style="background: none; border: none; color: #888; cursor: pointer; font-family: 'Inter'; font-weight: 600; font-size: 0.8rem; letter-spacing: 1px;">CUSTOMER</button>
        </div>

        <!-- Admin Form -->
        <form id="login-form">
            <h2 class="serif" style="font-size: 1.5rem; margin-bottom: 20px;">Admin Access</h2>
            <div class="form-group">
                <label>Master Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Authorize Access</button>
        </form>

        <!-- Customer Form (Hidden by default) -->
        <form id="customer-login-form" style="display: none;">
            <h2 class="serif" style="font-size: 1.5rem; margin-bottom: 20px;">Track Booking</h2>
            <div class="form-group">
                <label>Registered Phone Number</label>
                <input type="tel" id="client-phone" placeholder="+91 XXXX XXX XXX" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Access Portal</button>
            <p style="margin-top: 15px; font-size: 0.7rem; color: #888;">Enter the phone number used during booking.</p>
        </form>

        <div id="error-msg" class="error-msg">Invalid Credentials</div>
        
        <div style="margin-top: 2rem;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 1px;">← Back to Website</a>
        </div>
    </div>

    <script>
        function switchLogin(type) {
            const adminForm = document.getElementById('login-form');
            const customerForm = document.getElementById('customer-login-form');
            const tabs = document.querySelectorAll('.tab-btn');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            if (type === 'admin') {
                adminForm.style.display = 'block';
                customerForm.style.display = 'none';
                tabs[0].classList.add('active');
                tabs[0].style.color = 'var(--secondary)';
                tabs[1].classList.remove('active');
                tabs[1].style.color = '#888';
            } else {
                adminForm.style.display = 'none';
                customerForm.style.display = 'block';
                tabs[1].classList.add('active');
                tabs[1].style.color = 'var(--secondary)';
                tabs[0].classList.remove('active');
                tabs[0].style.color = '#888';
            }
        }

        // Customer Login Logic
        document.getElementById('customer-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('client-phone').value;
            const submitBtn = e.target.querySelector('.btn-login');
            
            submitBtn.innerText = 'Searching...';
            
            // For now, we allow access and store the phone to filter on client side
            localStorage.setItem('clientPhone', phone);
            
            setTimeout(() => {
                window.location.href = 'client.html';
            }, 800);
        });

        // Admin Login Logic (Existing)
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.querySelector('.btn-login');

            submitBtn.innerText = 'Verifying...';
            submitBtn.disabled = true;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.style.display = 'block';
                    submitBtn.innerText = 'Authorize Access';
                    submitBtn.disabled = false;
                }
            })
            .catch(err => {
                errorMsg.innerText = 'Server Error';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
