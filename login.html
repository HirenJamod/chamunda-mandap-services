<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific overrides for Login Page */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            cursor: none !important; /* Hide standard cursor */
        }

        .cursor {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
        }

        .cursor-follower {
            width: 25px;
            height: 25px;
            border: 2px solid var(--secondary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            color: var(--secondary);
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px !important;
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            color: white !important;
            font-size: 1rem;
            caret-color: var(--secondary);
        }

        input:focus {
            border-color: var(--secondary) !important;
            outline: none;
        }

        .btn-login {
            width: 100%;
            margin-top: 1rem;
            padding: 15px;
            border-radius: 12px;
        }

        .error-msg {
            color: #dc3545;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="login-card">
        <h2 class="serif">Admin Portal</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Secure Access Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Authorize Access</button>
            <div id="error-msg" class="error-msg">Invalid Security Credentials</div>
        </form>
        <div style="margin-top: 2rem;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 1px;">← Back to Website</a>
        </div>
    </div>

    <script>
        // Custom Cursor Logic
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            follower.style.left = (e.clientX - 10) + 'px';
            follower.style.top = (e.clientY - 10) + 'px';
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            })
            .catch(err => {
                console.error('Login error:', err);
                errorMsg.innerText = 'Server Error. Please try again.';
                errorMsg.style.display = 'block';
            });
        });
    </script>
</body>
</html>
