<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        /* Specific overrides for Login Page */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            font-family: 'Lora', serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .login-card h2 {
            color: var(--secondary);
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 15px !important;
            background: rgba(0,0,0,0.2) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            color: white !important;
            font-size: 1rem;
            caret-color: var(--secondary);
        }

        input:focus {
            border-color: var(--secondary) !important;
            outline: none;
        }

        .btn-login {
            width: 100%;
            margin-top: 1rem;
            padding: 15px;
            border-radius: 12px;
        }

        .error-msg {
            color: #dc3545;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <form id="login-form">
            <h2 class="serif" style="font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 2px;">ADMIN ACCESS</h2>
            <div class="form-group">
                <label>Master Security Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Authorize Access</button>
            <div id="error-msg" class="error-msg">Invalid Credentials</div>
        </form>
        
        <div style="margin-top: 2rem;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.8rem; letter-spacing: 1px;">← Back to Website</a>
        </div>
    </div>

    <script>
        // Admin Login Logic
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.querySelector('.btn-login');

            submitBtn.innerText = 'Verifying...';
            submitBtn.disabled = true;

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.style.display = 'block';
                    submitBtn.innerText = 'Authorize Access';
                    submitBtn.disabled = false;
                }
            })
            .catch(err => {
                errorMsg.innerText = 'Server Error';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
