<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wedding Portfolio | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #050505;
            --secondary: #C5A059;
            --accent: #1A1A1A;
            --text-gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background: var(--primary);
            color: #fff;
            font-family: 'Lora', serif;
            margin: 0;
            overflow-x: hidden;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
            background: radial-gradient(circle at 0% 0%, #0a0a0a 0%, #050505 100%);
        }

        /* Sidebar Luxury Styling */
        .sidebar {
            width: 260px;
            background: #080808;
            border-right: 1px solid var(--glass-border);
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 0 30px 40px 30px;
            text-align: left;
        }

        .sidebar-brand h2 {
            font-family: 'Playfair Display', serif;
            color: var(--secondary);
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin: 0;
        }

        .sidebar-nav {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sidebar-link {
            padding: 15px 30px;
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.4s var(--transition);
            border-left: 3px solid transparent;
        }

        .sidebar-link i {
            font-size: 1.1rem;
            width: 20px;
        }

        .sidebar-link:hover {
            color: var(--secondary);
            background: rgba(197, 160, 89, 0.03);
        }

        .sidebar-link.active {
            color: var(--secondary);
            background: rgba(197, 160, 89, 0.08);
            border-left-color: var(--secondary);
            font-weight: 600;
        }

        .main-content {
            margin-left: 260px;
            padding: 60px 6%;
            width: calc(100% - 260px);
            min-height: 100vh;
        }

        /* Header & Titles */
        .dashboard-header {
            margin-bottom: 60px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem !important;
            margin: 0 0 10px 0 !important;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: left !important;
        }

        /* Portfolio Cards */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .portfolio-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            transition: all 0.5s var(--transition);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .portfolio-item:hover {
            transform: translateY(-10px);
            border-color: var(--secondary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .item-type {
            font-size: 0.7rem;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .remove-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
        }

        .remove-btn:hover {
            opacity: 1;
            background: #dc3545;
            color: #fff;
        }

        /* Forms & Details */
        .details-panel {
            background: rgba(197, 160, 89, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px;
            margin-top: 80px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--secondary);
            font-weight: 600;
        }

        .luxury-input {
            background: #0d0d0d;
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 12px;
            color: #fff;
            font-family: 'Lora', serif;
            transition: 0.3s;
        }

        .luxury-input:focus {
            outline: none;
            border-color: var(--secondary);
            background: #121212;
        }

        .finalize-btn-premium {
            position: fixed;
            bottom: 40px;
            right: 6%;
            background: linear-gradient(135deg, var(--secondary), #D4AF37);
            color: #000;
            padding: 22px 50px;
            border-radius: 100px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 15px 45px rgba(197, 160, 89, 0.3);
            border: none;
            transition: 0.4s;
            z-index: 2000;
            display: none;
        }

        .finalize-btn-premium:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 60px rgba(197, 160, 89, 0.5);
            background: #fff;
        }

        .status-pill {
            padding: 10px 25px;
            border-radius: 100px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            backdrop-filter: blur(10px);
        }

        .pill-selection-finalized { background: rgba(197, 160, 89, 0.15); color: var(--secondary); border: 1px solid var(--secondary); }
        .pill-pending { background: rgba(255, 255, 255, 0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); }

        .empty-state {
            text-align: center;
            padding: 100px 0;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-brand">
                <h2 class="serif">CHAMUNDA<span>.</span></h2>
            </div>
            <div class="sidebar-nav">
                <a href="#" class="sidebar-link active"><i class="fas fa-th-large"></i> My Portfolio</a>
                <a href="services.html" class="sidebar-link"><i class="fas fa-list-ul"></i> Browse Menu</a>
                <a href="portfolio.html" class="sidebar-link"><i class="fas fa-gem"></i> Visual Inspiration</a>
                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 30px;">
                <a href="#" onclick="logout()" class="sidebar-link" style="margin-top: auto; color: #dc3545;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="dashboard-header">
                <div>
                    <h1 class="serif">My Wedding Portfolio</h1>
                    <p style="color: #666; font-size: 1.1rem;" id="welcome-msg">Curating your dream celebration.</p>
                </div>
                <div id="booking-status" class="status-pill pill-pending" style="display: none;">Status: Selection In Progress</div>
            </header>

            <div id="portfolio-content" class="portfolio-grid">
                <!-- Items loaded dynamically -->
            </div>

            <div id="event-details-section" class="details-panel" style="display: none;">
                <h2 class="serif" style="color: var(--secondary); margin-bottom: 40px; font-size: 2rem;">Event Specifics</h2>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Expected Event Date</label>
                        <input type="date" id="event-date" class="luxury-input">
                    </div>
                    <div class="input-group">
                        <label>Approx. Guest Count</label>
                        <input type="number" id="event-guests" placeholder="e.g. 500" class="luxury-input">
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Proposed Venue Location</label>
                        <input type="text" id="event-venue" placeholder="e.g. Grand Ballroom, Heritage Palace" class="luxury-input">
                    </div>
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Additional Notes or Vision</label>
                        <textarea id="event-notes" rows="4" placeholder="Share your unique requirements or theme ideas..." class="luxury-input"></textarea>
                    </div>
                </div>
            </div>

            <div id="empty-msg" class="empty-state" style="display: none;">
                <i class="fas fa-gem" style="font-size: 4rem; margin-bottom: 30px; opacity: 0.1;"></i>
                <h3 class="serif" style="color: #666; font-size: 1.8rem;">Your Canvas is Empty</h3>
                <p style="margin-bottom: 40px;">Explore our curated collections to begin your journey.</p>
                <a href="services.html" class="btn btn-primary" style="padding: 18px 45px;">Explore Services</a>
            </div>
        </div>
    </div>

    <button id="finalize-btn" class="finalize-btn-premium" onclick="finalizeBooking()">
        Finalize Request <i class="fas fa-chevron-right" style="margin-left: 15px;"></i>
    </button>

    <script>
        const clientInfo = JSON.parse(localStorage.getItem('clientInfo'));
        if (!clientInfo) window.location.href = 'client-auth.html';

        document.getElementById('welcome-msg').innerText = `Welcome back, ${clientInfo.name}. Curating your dream celebration.`;

        async function loadPortfolio() {
            const res = await fetch(`/api/client/portfolio/${clientInfo.id}`);
            const portfolio = await res.json();
            const grid = document.getElementById('portfolio-content');
            const emptyMsg = document.getElementById('empty-msg');
            const finalizeBtn = document.getElementById('finalize-btn');
            const statusPill = document.getElementById('booking-status');

            // Check for existing booking status
            const bookStatusRes = await fetch('/api/bookings');
            const allBookings = await bookStatusRes.json();
            const clientBooking = allBookings.find(b => b.phone === clientInfo.phone || b.client_id === clientInfo.id);
            
            if (clientBooking) {
                statusPill.innerText = `Status: ${clientBooking.status}`;
                statusPill.style.display = 'inline-block';
                statusPill.className = `status-pill pill-${clientBooking.status.toLowerCase().replace(/ /g, '-')}`;
                if (clientBooking.status !== 'Pending') {
                    finalizeBtn.style.display = 'none';
                }
            }

            if (portfolio.length === 0) {
                grid.innerHTML = '';
                if (!clientBooking) emptyMsg.style.display = 'block';
                finalizeBtn.style.display = 'none';
                return;
            }

            emptyMsg.style.display = 'none';
            if (!clientBooking || clientBooking.status === 'Pending') {
                finalizeBtn.style.display = 'block';
                document.getElementById('event-details-section').style.display = 'block';
            } else {
                document.getElementById('event-details-section').style.display = 'none';
            }
            
            grid.innerHTML = portfolio.map(item => `
                <div class="portfolio-item">
                    <span class="item-type">${item.item_type}</span>
                    <h3 style="margin: 0; font-size: 1.2rem;">${item.details.title}</h3>
                    <div class="remove-btn" onclick="removeItem('${item.id}')">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
            `).join('');
        }

        async function removeItem(itemId) {
            if (!confirm('Remove this item from your portfolio?')) return;
            const res = await fetch(`/api/client/portfolio/${itemId}`, { method: 'DELETE' });
            if (res.ok) loadPortfolio();
        }

        async function finalizeBooking() {
            const date = document.getElementById('event-date').value;
            const venue = document.getElementById('event-venue').value;
            if (!date || !venue) {
                alert("Please provide the Event Date and Venue Location before finalizing.");
                return;
            }

            const res = await fetch(`/api/client/portfolio/${clientInfo.id}`);
            const portfolio = await res.json();
            
            const bookingData = {
                client_id: clientInfo.id,
                name: clientInfo.name,
                phone: clientInfo.phone,
                date: date,
                venue: venue,
                guest_count: document.getElementById('event-guests').value,
                style: portfolio.map(p => p.details.title).join(', '),
                message: `PORTFOLIO BOOKING\nItems: ${portfolio.length}\nClient ID: ${clientInfo.id}\nSpecial Requests: ${document.getElementById('event-notes').value}`,
                status: 'Selection Finalized'
            };

            const bookRes = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });

            if (bookRes.ok) {
                alert('Your portfolio has been sent to the Admin! We will review it and update you shortly.');
                document.getElementById('booking-status').style.display = 'block';
                document.getElementById('finalize-btn').style.display = 'none';
                document.getElementById('event-details-section').style.display = 'none';
            }
        }

        function logout() {
            localStorage.removeItem('clientToken');
            localStorage.removeItem('clientInfo');
            window.location.href = 'index.html';
        }

        loadPortfolio();
    </script>
</body>
</html>
