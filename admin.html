<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Chamunda Mandap Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo serif">CMS Admin</div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-calendar-alt"></i> Bookings</a></li>
                <li><a href="#"><i class="fas fa-images"></i> Gallery</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="dashboard-header">
                <h2 class="serif">Booking Management</h2>
                <div class="admin-profile">
                    <span>Welcome, Admin</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Total Bookings</h4>
                    <div class="value" id="total-bookings">0</div>
                </div>
                <div class="stat-card">
                    <h4>Pending Inquiries</h4>
                    <div class="value" id="pending-bookings" style="color: #856404;">0</div>
                </div>
                <div class="stat-card">
                    <h4>Confirmed Dates</h4>
                    <div class="value" id="confirmed-bookings" style="color: #155724;">0</div>
                </div>
            </div>

            <!-- Table -->
            <div id="bookings-section" class="data-table-container">
                <div id="loader" class="loader-container">
                    <span class="loader"></span>
                </div>
                <table id="bookings-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Client Name</th>
                            <th>Date</th>
                            <th>Style</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-list">
                        <!-- Bookings will be loaded here -->
                    </tbody>
                </table>
            </div>

            <!-- Gallery Manager -->
            <div id="gallery-section" class="data-table-container" style="margin-top: 40px;">
                <h3 class="serif" style="margin-bottom: 20px;">Gallery Manager</h3>
                <form id="gallery-form" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-bottom: 30px;">
                    <input type="text" id="img-url" placeholder="Image URL" required>
                    <input type="text" id="img-caption" placeholder="Caption" required>
                    <button type="submit" class="btn btn-primary">Add Photo</button>
                </form>
                <div class="gallery-admin-list" id="gallery-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;">
                    <!-- Gallery items -->
                </div>
            </div>

            <!-- Service Manager -->
            <div id="services-section" class="data-table-container" style="margin-top: 40px;">
                <h3 class="serif" style="margin-bottom: 20px;">Service Manager</h3>
                <form id="service-form" style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; margin-bottom: 30px;">
                    <input type="text" id="service-title" placeholder="Service Title (e.g. Mandap Decor)" required>
                    <input type="text" id="service-desc" placeholder="Description" required>
                    <input type="text" id="service-img" placeholder="Image URL" required>
                    <button type="submit" class="btn btn-primary">Add Service</button>
                </form>
                <div id="services-admin-list">
                    <!-- Services list -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check Auth
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        function loadBookings() {
            fetch('/api/bookings')
                .then(res => res.json())
                .then(bookings => {
                    const list = document.getElementById('bookings-list');
                    const table = document.getElementById('bookings-table');
                    const loader = document.getElementById('loader');
                    
                    // Update Stats
                    document.getElementById('total-bookings').innerText = bookings.length;
                    document.getElementById('pending-bookings').innerText = bookings.filter(b => b.status === 'Pending').length;
                    document.getElementById('confirmed-bookings').innerText = bookings.filter(b => b.status === 'Confirmed').length;

                    list.innerHTML = bookings.map(b => `
                        <tr>
                            <td>${b.id}</td>
                            <td>${b.name}</td>
                            <td>${b.date}</td>
                            <td>${b.style}</td>
                            <td><span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span></td>
                            <td>
                                <button class="action-btn btn-approve" onclick="updateStatus('${b.id}', 'Confirmed')"><i class="fas fa-check"></i></button>
                                <button class="action-btn btn-reject" onclick="updateStatus('${b.id}', 'Rejected')"><i class="fas fa-times"></i></button>
                            </td>
                        </tr>
                    `).join('');

                    loader.style.display = 'none';
                    table.style.display = 'table';
                })
                .catch(err => console.error('Error loading bookings:', err));
        }

        function updateStatus(id, newStatus) {
            fetch(`/api/bookings/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            })
            .then(res => res.json())
            .then(() => loadBookings())
            .catch(err => console.error('Error updating status:', err));
        }

        // Gallery Logic
        function loadGallery() {
            fetch('/api/gallery')
                .then(res => res.json())
                .then(images => {
                    const list = document.getElementById('gallery-list');
                    list.innerHTML = images.map(img => `
                        <div style="position: relative;">
                            <img src="${img.image_url}" style="width: 100%; height: 100px; object-fit: cover; border-radius: 8px;">
                            <button onclick="deleteImage(${img.id})" style="position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer;">&times;</button>
                        </div>
                    `).join('');
                });
        }

        document.getElementById('gallery-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const image_url = document.getElementById('img-url').value;
            const caption = document.getElementById('img-caption').value;

            fetch('/api/gallery', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image_url, caption })
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById('gallery-form').reset();
                loadGallery();
            });
        });

        function deleteImage(id) {
            if (confirm('Delete this image?')) {
                fetch(`/api/gallery/${id}`, { method: 'DELETE' })
                    .then(() => loadGallery());
            }
        }

        // Services Logic
        function loadServices() {
            fetch('/api/services')
                .then(res => res.json())
                .then(services => {
                    const list = document.getElementById('services-admin-list');
                    list.innerHTML = services.map(s => `
                        <div style="display: flex; align-items: center; gap: 20px; padding: 15px; border-bottom: 1px solid #eee;">
                            <img src="${s.image_url}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 5px;">
                            <div style="flex-grow: 1;">
                                <strong>${s.title}</strong>
                                <p style="font-size: 0.8rem; color: #888;">${s.description}</p>
                            </div>
                            <button onclick="deleteService(${s.id})" class="action-btn btn-reject"><i class="fas fa-trash"></i></button>
                        </div>
                    `).join('');
                });
        }

        document.getElementById('service-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('service-title').value;
            const description = document.getElementById('service-desc').value;
            const image_url = document.getElementById('service-img').value;

            fetch('/api/services', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, image_url })
            })
            .then(res => res.json())
            .then(() => {
                document.getElementById('service-form').reset();
                loadServices();
            });
        });

        function deleteService(id) {
            if (confirm('Delete this service?')) {
                fetch(`/api/services/${id}`, { method: 'DELETE' })
                    .then(() => loadServices());
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadBookings();
            loadGallery();
            loadServices();
        });
    </script>
</body>
</html>
