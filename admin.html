<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Chamunda Mandap Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo serif">CMS Admin</div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-calendar-alt"></i> Bookings</a></li>
                <li><a href="#"><i class="fas fa-images"></i> Gallery</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                <li><a href="index.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="dashboard-header">
                <h2 class="serif">Booking Management</h2>
                <div class="admin-profile">
                    <span>Welcome, Admin</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Total Bookings</h4>
                    <div class="value" id="total-bookings">0</div>
                </div>
                <div class="stat-card">
                    <h4>Pending Inquiries</h4>
                    <div class="value" id="pending-bookings" style="color: #856404;">0</div>
                </div>
                <div class="stat-card">
                    <h4>Confirmed Dates</h4>
                    <div class="value" id="confirmed-bookings" style="color: #155724;">0</div>
                </div>
            </div>

            <!-- Table -->
            <div class="data-table-container">
                <table id="bookings-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Client Name</th>
                            <th>Date</th>
                            <th>Style</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-list">
                        <!-- Bookings will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Check Auth
        if (localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'login.html';
        }

        function loadBookings() {
            fetch('/api/bookings')
                .then(res => res.json())
                .then(bookings => {
                    const list = document.getElementById('bookings-list');
                    
                    // Update Stats
                    document.getElementById('total-bookings').innerText = bookings.length;
                    document.getElementById('pending-bookings').innerText = bookings.filter(b => b.status === 'Pending').length;
                    document.getElementById('confirmed-bookings').innerText = bookings.filter(b => b.status === 'Confirmed').length;

                    list.innerHTML = bookings.map(b => `
                        <tr>
                            <td>${b.id}</td>
                            <td>${b.name}</td>
                            <td>${b.date}</td>
                            <td>${b.style}</td>
                            <td><span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span></td>
                            <td>
                                <button class="action-btn btn-approve" onclick="updateStatus('${b.id}', 'Confirmed')"><i class="fas fa-check"></i></button>
                                <button class="action-btn btn-reject" onclick="updateStatus('${b.id}', 'Rejected')"><i class="fas fa-times"></i></button>
                            </td>
                        </tr>
                    `).join('');
                })
                .catch(err => console.error('Error loading bookings:', err));
        }

        function updateStatus(id, newStatus) {
            fetch(`/api/bookings/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            })
            .then(res => res.json())
            .then(() => loadBookings())
            .catch(err => console.error('Error updating status:', err));
        }

        document.addEventListener('DOMContentLoaded', loadBookings);
    </script>
</body>
</html>
