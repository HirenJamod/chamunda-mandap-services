<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo serif">CHAMUNDA<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html" class="active">Portfolio</a></li>
            <li><a href="booking.html">Book Now</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="client.html" style="color: var(--secondary); font-size: 0.8rem; margin-left: 20px;"><i class="fas fa-user-circle"></i> Client Portal</a></li>
        </ul>
    </nav>

    <section id="gallery" style="padding-top: 150px; background-color: #fff;">
        <div class="section-header">
            <h1 class="serif" style="color: var(--primary); font-size: 4rem; margin-bottom: 20px;">Inspiration Gallery</h1>
            <p style="color: #666; max-width: 600px; margin: 0 auto;">A collection of our finest works, showcasing the elegance and tradition we bring to every event.</p>
        </div>
        <div class="gallery-masonry" id="dynamic-gallery">
            <div class="loader-container" style="grid-column: 1/-1;">
                <span class="loader"></span>
            </div>
        </div>
    </section>

    <footer id="contact" style="background: var(--primary); color: white; padding: 60px 10% 20px; text-align: center;">
        <h2 class="serif" style="color: var(--secondary); margin-bottom: 30px;">CHAMUNDA</h2>
        <p style="font-size: 0.8rem; opacity: 0.6;">&copy; 2026 Chamunda Mandap Services. All Rights Reserved.</p>
    </footer>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a1b1b1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="music-toggle" class="music-btn" title="Toggle Background Music">
        <i class="fas fa-music"></i>
        <div class="music-waves">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
