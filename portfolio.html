<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo serif">CHAMUNDA<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html" class="active">Portfolio</a></li>
            <li><a href="booking.html">Book Now</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="track.html" style="color: var(--secondary); font-size: 0.8rem; margin-left: 20px;"><i class="fas fa-user-circle"></i> Client Portal</a></li>
        </ul>
    </nav>

    <div class="portfolio-page-luxury">
        <header class="portfolio-header-luxury">
            <h1 class="serif">OUR PORTFOLIO</h1>
            <p style="color: rgba(255,255,255,0.5); letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase;">Exquisite Artistry & Cinematic Traditions</p>
        </header>

        <section id="gallery-luxury-section">
            <div class="gallery-masonry-luxury" id="dynamic-gallery">
                <!-- Live data will load here with Luxury classes -->
                <div class="loader-container" style="grid-column: 1/-1;">
                    <span class="loader"></span>
                </div>
            </div>
        </section>
    </div>

    <footer id="global-footer" style="background: var(--primary); padding: 40px 10%; border-top: 1px solid var(--glass-border); text-align: center;">
        <h2 class="serif" style="color: var(--secondary); font-size: 1.5rem; margin-bottom: 10px;">CHAMUNDA</h2>
        <p style="font-size: 0.7rem; opacity: 0.5;">&copy; 2026 Chamunda Mandap Services.</p>
    </footer>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a1b1b1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="music-toggle" class="music-btn" title="Toggle Background Music">
        <i class="fas fa-music"></i>
        <div class="music-waves">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
