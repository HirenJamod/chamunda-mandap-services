<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body.client-dashboard-luxury {
            margin: 0;
            background: #121212;
            color: #fff;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .client-sidebar-luxury {
            width: 280px;
            background: #1a1a1a;
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 40px 20px;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }
        .main-content-luxury {
            margin-left: 280px;
            flex-grow: 1;
            padding: 60px 5%;
            max-width: 1200px;
        }
        .client-logo-luxury {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 50px;
            display: block;
            text-decoration: none;
        }
        .client-nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            color: #666;
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .client-nav-link.active {
            background: rgba(197, 160, 89, 0.1);
            color: var(--secondary);
            border-left: 4px solid var(--secondary);
            border-radius: 0 12px 12px 0;
        }
        .client-nav-link:hover:not(.active) {
            color: #fff;
            background: rgba(255,255,255,0.03);
        }
        .welcome-badge {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .luxury-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
            margin-top: 30px;
        }
        .luxury-table th {
            text-align: left;
            padding: 10px 20px;
            color: #444;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .luxury-table td {
            padding: 25px 20px;
            background: #1a1a1a;
            border-top: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .luxury-table tr td:first-child { border-left: 1px solid rgba(255,255,255,0.03); border-radius: 15px 0 0 15px; }
        .luxury-table tr td:last-child { border-right: 1px solid rgba(255,255,255,0.03); border-radius: 0 15px 15px 0; }
        .status-pill {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pill-pending { background: rgba(197, 160, 89, 0.15); color: var(--secondary); }
        .pill-confirmed { background: rgba(40, 167, 69, 0.15); color: #2ecc71; }
    </style>
</head>
<body class="client-dashboard-luxury">
    <aside class="client-sidebar-luxury">
        <a href="index.html" class="client-logo-luxury">Client Portal<span style="color: var(--secondary);">.</span></a>
        <nav>
            <a href="#" class="client-nav-link active" onclick="showSection('bookings')">
                <i class="fas fa-calendar-alt"></i> My Bookings
            </a>
            <a href="booking.html" class="client-nav-link">
                <i class="fas fa-edit"></i> New Inquiry
            </a>
            <div style="margin: 40px 0 15px; color: #333; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; padding-left: 25px;">Quick Links</div>
            <a href="index.html" class="client-nav-link"><i class="fas fa-home"></i> Home Page</a>
            <a href="services.html" class="client-nav-link"><i class="fas fa-magic"></i> Our Services</a>
            <a href="portfolio.html" class="client-nav-link"><i class="fas fa-images"></i> Inspiration Gallery</a>
            
            <a href="#" id="logout-btn" class="client-nav-link" style="margin-top: 60px; color: rgba(231, 76, 60, 0.6);">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <main class="main-content-luxury">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px;">
            <div>
                <h1 class="serif" style="font-size: 2.8rem; margin: 0;">My Wedding Inquiries</h1>
                <p style="color: #555; margin-top: 10px;">Track the status of your mandap and decoration bookings below</p>
            </div>
            <div class="welcome-badge">
                <span style="font-size: 0.8rem; color: #777;">Welcome, <strong id="user-display" style="color: #fff;">Guest</strong></span>
                <div style="width: 32px; height: 32px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000;">
                    <i class="fas fa-user" style="font-size: 0.8rem;"></i>
                </div>
            </div>
        </header>

        <section id="bookings-section">
            <div id="empty-state" style="display: none; text-align: center; padding: 100px 0;">
                <i class="fas fa-calendar-times" style="font-size: 3rem; color: #222; margin-bottom: 20px;"></i>
                <p style="color: #444;">No bookings found for your phone number.</p>
            </div>
            
            <table id="bookings-table" class="luxury-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Event Date</th>
                        <th>Style</th>
                        <th>Status</th>
                        <th>Submitted On</th>
                    </tr>
                </thead>
                <tbody id="bookings-list">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const clientPhone = localStorage.getItem('clientPhone');
            const adminToken = localStorage.getItem('adminToken');

            if (!clientPhone && !adminToken) {
                window.location.href = 'track.html';
                return;
            }

            if (clientPhone) {
                document.getElementById('user-display').innerText = clientPhone;
            }

            // Fetch and Filter Bookings
            fetch('/api/bookings')
                .then(res => res.json())
                .then(bookings => {
                    const filtered = clientPhone ? 
                        bookings.filter(b => b.phone.includes(clientPhone) || clientPhone.includes(b.phone)) : 
                        bookings;

                    const list = document.getElementById('bookings-list');
                    const table = document.getElementById('bookings-table');
                    const empty = document.getElementById('empty-state');

                    if (filtered.length === 0) {
                        empty.style.display = 'block';
                    } else {
                        table.style.display = 'table';
                        list.innerHTML = filtered.map(b => `
                            <tr>
                                <td><strong style="color: var(--secondary)">#${b.id}</strong></td>
                                <td>${b.date}</td>
                                <td>${b.style}</td>
                                <td><span class="status-pill ${b.status.toLowerCase() === 'confirmed' ? 'pill-confirmed' : 'pill-pending'}">${b.status}</span></td>
                                <td style="color: #444; font-size: 0.8rem;">${new Date(b.timestamp).toLocaleDateString()}</td>
                            </tr>
                        `).join('');
                    }
                });

            // Logout
            document.getElementById('logout-btn').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.clear();
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
