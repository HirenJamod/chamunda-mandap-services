<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Panel | Chamunda Mandap Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar" style="background: #2c3e50;">
            <div class="sidebar-logo serif" style="color: #ecf0f1;">Client Portal</div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fas fa-clipboard-list"></i> My Bookings</a></li>
                <li><a href="index.html#booking"><i class="fas fa-plus"></i> New Inquiry</a></li>
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="dashboard-header">
                <h2 class="serif">My Wedding Inquiries</h2>
                <div class="user-info">
                    <span>Welcome Guest</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </div>

            <div class="data-table-container">
                <p style="margin-bottom: 20px; color: #666;">Track the status of your mandap and decoration bookings below.</p>
                <table>
                    <thead>
                        <tr>
                            <th>Booking ID</th>
                            <th>Event Date</th>
                            <th>Style</th>
                            <th>Status</th>
                            <th>Submitted On</th>
                        </tr>
                    </thead>
                    <tbody id="client-bookings-list">
                        <!-- Bookings will be loaded here -->
                    </tbody>
                </table>
                <div id="no-bookings" style="display: none; text-align: center; padding: 40px;">
                    <i class="fas fa-calendar-times" style="font-size: 3rem; color: #ccc; margin-bottom: 15px;"></i>
                    <p>You haven't made any inquiries yet. <a href="index.html#booking">Click here to book.</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/bookings')
                .then(res => res.json())
                .then(bookings => {
                    const list = document.getElementById('client-bookings-list');
                    const emptyState = document.getElementById('no-bookings');

                    if (bookings.length === 0) {
                        emptyState.style.display = 'block';
                    } else {
                        list.innerHTML = bookings.map(b => `
                            <tr>
                                <td><strong>${b.id}</strong></td>
                                <td>${b.date}</td>
                                <td>${b.style}</td>
                                <td><span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span></td>
                                <td>${b.timestamp}</td>
                            </tr>
                        `).join('');
                    }
                })
                .catch(err => console.error('Error loading client bookings:', err));
        });
    </script>
</body>
</html>
