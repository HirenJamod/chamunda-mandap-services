<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Access | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            margin: 0;
            overflow: hidden;
            font-family: 'Lora', serif;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 50px 150px rgba(0,0,0,0.6);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tabs {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 15px;
        }

        .tab {
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--secondary);
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input {
            width: 100%;
            padding: 15px !important;
            background: rgba(255, 255, 255, 0.02) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 12px !important;
            color: white !important;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--secondary) !important;
            outline: none;
            background: rgba(255, 255, 255, 0.05) !important;
        }

        .btn-auth {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        #signup-form { display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 class="serif" style="font-size: 1.8rem; color: #fff; margin-bottom: 10px;">Wedding Portal</h2>
        <p style="color: #666; font-size: 0.85rem; margin-bottom: 30px;">Manage your cinematic journey.</p>

        <div class="tabs">
            <span class="tab active" onclick="showForm('login')">Login</span>
            <span class="tab" onclick="showForm('signup')">Sign Up</span>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">ENTER DASHBOARD</button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="John & Jane" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="signup-phone" placeholder="+91 00000 00000" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="signup-pass" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">CREATE ACCOUNT</button>
        </form>

        <div style="margin-top: 2rem;">
            <a href="index.html" style="color: #444; text-decoration: none; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">← Back to Home</a>
        </div>
    </div>

    <script>
        function showForm(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (type === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('signup-form').style.display = 'none';
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('signup-form').style.display = 'block';
            }
        }

        // Logic for Signup
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('signup-name').value,
                email: document.getElementById('signup-email').value,
                phone: document.getElementById('signup-phone').value,
                password: document.getElementById('signup-pass').value
            };
            
            const res = await fetch('/api/client/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.success) {
                alert('Account created! Please login.');
                showForm('login');
            } else {
                alert(result.error || 'Registration failed');
            }
        });

        // Logic for Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-pass').value
            };
            
            const res = await fetch('/api/client/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.success) {
                localStorage.setItem('clientToken', result.token);
                localStorage.setItem('clientInfo', JSON.stringify(result.client));
                window.location.href = 'client-dashboard.html';
            } else {
                alert(result.message || 'Login failed');
            }
        });
    </script>
</body>
</html>
