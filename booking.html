<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Event | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo serif">CHAMUNDA<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="booking.html" class="active">Book Now</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="client.html" style="color: var(--secondary); font-size: 0.8rem; margin-left: 20px;"><i class="fas fa-user-circle"></i> Client Portal</a></li>
        </ul>
    </nav>

    <div class="no-scroll-wrapper" style="padding-top: 80px;">
        <section id="booking-luxury" style="flex-grow: 1; padding: 0 5% 20px; display: flex; flex-direction: column;">
            <div class="booking-header-accent" style="text-align: center; margin-bottom: 20px;">
                <img src="https://img.icons8.com/ios/50/C5A059/flower.png" alt="Accent" style="width: 30px; margin-bottom: 10px;">
                <h1 class="serif" style="font-size: 3rem; color: #fff;">WEDDING BOOKING</h1>
            </div>

            <div class="scrollable-content" style="padding: 10px;">
                <div class="booking-glass-card" style="margin: 0 auto; max-width: 1200px;">
                    <form id="booking-form-premium">
                        <div class="form-grid-2">
                            <div class="form-column">
                                <div class="form-group-premium">
                                    <label>Couple's Names</label>
                                    <input type="text" id="couple-names" placeholder="Enter both names" required>
                                </div>
                                <div class="form-grid-inner" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                                    <div class="form-group-premium">
                                        <label>Date</label>
                                        <input type="date" id="booking-date" required>
                                    </div>
                                    <div class="form-group-premium">
                                        <label>Guests</label>
                                        <input type="number" id="guest-count" placeholder="Approx.">
                                    </div>
                                </div>
                                <div class="form-group-premium">
                                    <label>Venue</label>
                                    <input type="text" id="wedding-venue" placeholder="Location name">
                                </div>
                                <div class="services-required">
                                    <label style="display: block; margin-bottom: 10px; color: var(--secondary); font-size: 0.8rem;">Services</label>
                                    <div class="checkbox-grid">
                                        <label class="check-container">Venue <input type="checkbox" class="service-check" value="Venue"> <span class="checkmark"></span></label>
                                        <label class="check-container">Catering <input type="checkbox" class="service-check" value="Catering"> <span class="checkmark"></span></label>
                                        <label class="check-container">Decor <input type="checkbox" class="service-check" value="Decor"> <span class="checkmark"></span></label>
                                    </div>
                                </div>
                            </div>

                            <div class="form-column">
                                <div class="inspiration-header">
                                    <label>SELECT INSPIRATION</label>
                                </div>
                                <div id="booking-gallery-selector" class="inspiration-grid-v2" style="height: 150px; overflow-y: auto;">
                                    <!-- Images will load here -->
                                </div>
                                <div class="form-group-premium" style="margin-top: 15px;">
                                    <label>Special Requests</label>
                                    <textarea id="special-requests" rows="3" placeholder="Your vision..."></textarea>
                                </div>
                                <button type="submit" class="btn-submit-luxury" style="width: 100%; margin-top: 10px;">SUBMIT BOOKING</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <footer id="contact" style="background: var(--primary); color: white; padding: 60px 10% 20px; text-align: center;">
        <h2 class="serif" style="color: var(--secondary); margin-bottom: 30px;">CHAMUNDA</h2>
        <p style="font-size: 0.8rem; opacity: 0.6;">&copy; 2026 Chamunda Mandap Services. All Rights Reserved.</p>
    </footer>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_2f28a3830c.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="music-toggle" class="music-btn" title="Toggle Background Music">
        <i class="fas fa-music"></i>
        <div class="music-waves">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
