<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Event | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo serif">CHAMUNDA<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="booking.html" class="active">Book Now</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="client.html" style="color: var(--secondary); font-size: 0.8rem; margin-left: 20px;"><i class="fas fa-user-circle"></i> Client Portal</a></li>
        </ul>
    </nav>

    <section id="booking-luxury" style="padding-top: 150px; background: #050505; min-height: 100vh; padding-bottom: 100px;">
        <div class="booking-container-premium">
            <div class="booking-header-accent">
                <img src="https://img.icons8.com/ios/50/C5A059/flower.png" alt="Accent" style="width: 40px; margin-bottom: 15px;">
                <h1 class="serif" style="font-size: 4rem; letter-spacing: 5px; color: #fff;">WEDDING BOOKING</h1>
            </div>

            <div class="booking-glass-card">
                <form id="booking-form-premium">
                    <div class="form-grid-2">
                        <div class="form-column">
                            <div class="form-group-premium">
                                <label>Couple's Names</label>
                                <input type="text" id="couple-names" placeholder="Enter both names" required>
                            </div>
                            <div class="form-group-premium">
                                <label>Preferred Date (DD/MM/YYYY)</label>
                                <input type="date" id="booking-date" required>
                            </div>
                            <div class="form-grid-inner">
                                <div class="form-group-premium">
                                    <label>Guest Count</label>
                                    <input type="number" id="guest-count" placeholder="Approx. guests">
                                </div>
                                <div class="form-group-premium">
                                    <label>Wedding Venue</label>
                                    <input type="text" id="wedding-venue" placeholder="Location name">
                                </div>
                            </div>
                            <div class="form-group-premium">
                                <label>Ceremony & Reception Details</label>
                                <textarea id="ceremony-details" rows="3" placeholder="Tell us about the flow of your day..."></textarea>
                            </div>
                            
                            <div class="services-required">
                                <label style="display: block; margin-bottom: 15px; color: var(--secondary); font-size: 0.9rem; letter-spacing: 1px;">Services Required</label>
                                <div class="checkbox-grid">
                                    <label class="check-container">Venue <input type="checkbox" class="service-check" value="Venue"> <span class="checkmark"></span></label>
                                    <label class="check-container">Catering <input type="checkbox" class="service-check" value="Catering"> <span class="checkmark"></span></label>
                                    <label class="check-container">Decor <input type="checkbox" class="service-check" value="Decor"> <span class="checkmark"></span></label>
                                    <label class="check-container">Photography <input type="checkbox" class="service-check" value="Photography"> <span class="checkmark"></span></label>
                                    <label class="check-container">Music <input type="checkbox" class="service-check" value="Music"> <span class="checkmark"></span></label>
                                </div>
                            </div>
                        </div>

                        <div class="form-column">
                            <div class="inspiration-header">
                                <label>SELECT INSPIRATION</label>
                                <span class="font-tag">Cormorant Garamond</span>
                            </div>
                            <div id="booking-gallery-selector" class="inspiration-grid-v2">
                                <!-- Images will load here -->
                            </div>
                            
                            <div class="progress-section">
                                <div class="progress-bar-container">
                                    <div class="progress-fill" style="width: 40%;"></div>
                                </div>
                                <span class="progress-text">40% Complete</span>
                            </div>

                            <div class="form-group-premium" style="margin-top: 30px;">
                                <label>Special Requests</label>
                                <textarea id="special-requests" rows="5" placeholder="Any specific visions or dreams..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div style="text-align: center; margin-top: 50px;">
                        <button type="submit" class="btn-submit-luxury">SUBMIT BOOKING</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer id="contact" style="background: var(--primary); color: white; padding: 60px 10% 20px; text-align: center;">
        <h2 class="serif" style="color: var(--secondary); margin-bottom: 30px;">CHAMUNDA</h2>
        <p style="font-size: 0.8rem; opacity: 0.6;">&copy; 2026 Chamunda Mandap Services. All Rights Reserved.</p>
    </footer>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_2f28a3830c.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="music-toggle" class="music-btn" title="Toggle Background Music">
        <i class="fas fa-music"></i>
        <div class="music-waves">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
