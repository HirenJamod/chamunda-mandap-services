<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo serif">CHAMUNDA<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html" class="active">Services</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="booking.html">Book Now</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="client.html" style="color: var(--secondary); font-size: 0.8rem; margin-left: 20px;"><i class="fas fa-user-circle"></i> Client Portal</a></li>
        </ul>
    </nav>

    <section id="services-hero">
        <div class="glass-panel-premium" style="text-align: center; margin-bottom: 40px;">
            <span class="gold-accent-text" style="letter-spacing: 5px; font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 20px;">Curated Artistry</span>
            <h1 class="editorial-title">Signature Services</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto;">We don't just decorate; we compose cinematic experiences for your most sacred moments.</p>
        </div>
    </section>

    <section id="dynamic-services-section" style="padding-top: 0;">
        <div class="services-grid" id="dynamic-services" style="width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 5%;">
            <!-- Intelligently loaded via JS -->
            <div class="loader-container" style="grid-column: 1/-1;">
                <span class="loader"></span>
            </div>
        </div>
    </section>

    <footer id="global-footer" style="background: var(--primary); padding: 80px 10%; border-top: 1px solid var(--glass-border); text-align: center;">
        <div style="max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; align-items: center;">
            <h2 class="serif" style="color: var(--secondary); font-size: 2.5rem; margin-bottom: 20px;">CHAMUNDA</h2>
            <div class="social-links" style="display: flex; gap: 30px; margin-bottom: 40px;">
                <a href="#" style="color: white; font-size: 1.2rem;"><i class="fab fa-instagram"></i></a>
                <a href="#" style="color: white; font-size: 1.2rem;"><i class="fab fa-facebook"></i></a>
                <a href="#" style="color: white; font-size: 1.2rem;"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p style="font-size: 0.8rem; opacity: 0.5;">&copy; 2026 Chamunda Mandap Services. Crafting legacies since 1995.</p>
        </div>
    </footer>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.pixabay.com/audio/2023/11/05/audio_2e2837380c.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="music-toggle" class="music-btn" title="Toggle Background Music">
        <i class="fas fa-music"></i>
        <div class="music-waves">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
