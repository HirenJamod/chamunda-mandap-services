<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Services | Chamunda Mandap Services</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <a href="index.html" class="logo serif">CHAMUNDA<span>.</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html" class="active">Services</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="booking.html">Book Now</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="client.html" style="color: var(--secondary); font-size: 0.8rem; margin-left: 20px;"><i class="fas fa-user-circle"></i> Client Portal</a></li>
        </ul>
    </nav>

    <div class="no-scroll-wrapper">
        <section id="services" style="flex-grow: 1; padding: 0 5% 50px; display: flex; flex-direction: column;">
            <div class="section-header" style="padding-bottom: 30px;">
                <h1 class="serif" style="margin-bottom: 10px;">Signature Services</h1>
                <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">Experience the art of luxury mandap decorations in a cinematic full-screen view.</p>
            </div>
            
            <div class="scrollable-content">
                <div class="services-grid" id="dynamic-services">
                    <div class="loader-container" style="grid-column: 1/-1;">
                        <span class="loader"></span>
                    </div>
                </div>
            </div>
        </section>

        <footer id="contact" style="background: var(--primary); padding: 20px 10%; border-top: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
            <h2 class="serif" style="color: var(--secondary); font-size: 1.5rem; margin-bottom: 0;">CHAMUNDA</h2>
            <div class="social-links" style="display: flex; gap: 20px;">
                <a href="#" style="color: white;"><i class="fab fa-instagram"></i></a>
                <a href="#" style="color: white;"><i class="fab fa-facebook"></i></a>
                <a href="#" style="color: white;"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom: 0;">&copy; 2026 Chamunda Mandap Services.</p>
        </footer>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop autoplay>
        <source src="https://cdn.pixabay.com/audio/2023/11/05/audio_2e2837380c.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div id="music-toggle" class="music-btn" title="Toggle Background Music">
        <i class="fas fa-music"></i>
        <div class="music-waves">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
